<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .chat-container {
            width: 100%;
            max-width: 1000px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.assistant {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .message.user .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.assistant .message-content {
            background: white;
            color: #333;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .message-content a {
            color: #667eea;
            text-decoration: none;
            border-bottom: 1px solid #667eea;
            transition: all 0.2s;
        }

        .message-content a:hover {
            color: #764ba2;
            border-bottom-color: #764ba2;
            background: rgba(102, 126, 234, 0.1);
        }

        .message-content strong {
            font-weight: 600;
            color: #333;
        }

        .message.user .message-content strong {
            color: white;
        }

        .message.user .message-content a {
            color: white;
            border-bottom-color: rgba(255, 255, 255, 0.7);
        }

        .message.user .message-content a:hover {
            border-bottom-color: white;
            background: rgba(255, 255, 255, 0.2);
        }

        .chat-input-container {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
        }

        .chat-input-form {
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .chat-input:focus {
            border-color: #667eea;
        }

        .chat-input:disabled {
            background: #f5f5f5;
            cursor: not-allowed;
        }

        .send-button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .send-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .send-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .send-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .typing-indicator {
            display: none;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            max-width: 70%;
        }

        .typing-indicator.active {
            display: block;
            animation: fadeIn 0.3s ease-in;
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .typing-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 60%, 100% {
                transform: translateY(0);
            }
            30% {
                transform: translateY(-10px);
            }
        }

        .error-message {
            background: #ff4444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 20px;
            text-align: center;
            animation: fadeIn 0.3s ease-in;
        }

        /* Date picker styling */
        .date-picker-container {
            padding: 15px 20px;
            background: linear-gradient(to right, #fafafa, #ffffff);
            border-top: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .date-picker-label {
            font-size: 15px;
            color: #667eea;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .date-input {
            padding: 10px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: #333;
            outline: none;
            transition: all 0.3s ease;
            cursor: pointer;
            background: white;
            min-width: 150px;
        }

        .date-input:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }

        .date-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            background: #fafffe;
        }

        .date-range-separator {
            color: #999;
            font-size: 16px;
            font-weight: 500;
            padding: 0 4px;
        }

        .clear-dates-btn {
            padding: 10px 18px;
            background: linear-gradient(135deg, #f5f5f5, #e8e8e8);
            color: #666;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.3px;
        }

        .clear-dates-btn:hover {
            background: linear-gradient(135deg, #e0e0e0, #d0d0d0);
            transform: translateY(-1px);
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.15);
        }

        .clear-dates-btn:active {
            transform: translateY(0);
        }

        .date-info {
            font-size: 13px;
            font-weight: 600;
            color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.12), rgba(118, 75, 162, 0.12));
            padding: 8px 16px;
            border-radius: 15px;
            display: none;
            letter-spacing: 0.3px;
            border: 1px solid rgba(102, 126, 234, 0.2);
        }

        .date-info.active {
            display: inline-block;
            animation: fadeIn 0.3s ease-in;
        }

        /* Scrollbar styling */
        .chat-messages::-webkit-scrollbar {
            width: 8px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            🤖 AI Agent Chat
        </div>
        <div class="chat-messages" id="chatMessages">
            <div class="message assistant">
                <div class="message-content">
                    您好！我是 AI 助手，有什麼可以幫助您的嗎？
                </div>
            </div>
        </div>
        <div class="date-picker-container">
            <span class="date-picker-label">📅 日期篩選：</span>
            <input type="date" class="date-input" id="startDate" title="選擇開始日期" placeholder="yyyy/mm/dd">
            <span class="date-range-separator">至</span>
            <input type="date" class="date-input" id="endDate" title="選擇結束日期" placeholder="yyyy/mm/dd">
            <button type="button" class="clear-dates-btn" id="clearDates">清除</button>
            <span class="date-info" id="dateInfo"></span>
        </div>
        <div class="chat-input-container">
            <form class="chat-input-form" id="chatForm">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="messageInput" 
                    placeholder="輸入您的訊息..."
                    autocomplete="off"
                    data-form-type="other"
                    data-lpignore="true"
                    required
                >
                <button type="submit" class="send-button" id="sendButton">
                    發送
                </button>
            </form>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const sendButton = document.getElementById('sendButton');
        const startDateInput = document.getElementById('startDate');
        const endDateInput = document.getElementById('endDate');
        const clearDatesBtn = document.getElementById('clearDates');
        const dateInfo = document.getElementById('dateInfo');

        // n8n webhook endpoint
        const WEBHOOK_URL = 'https://n8n.my-yang.online/webhook/test01';

        // Date picker functionality
        function formatDateDisplay(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}/${month}/${day}`;
        }

        function updateDateInfo() {
            const startDate = startDateInput.value;
            const endDate = endDateInput.value;
            
            if (startDate || endDate) {
                let info = '';
                if (startDate && endDate) {
                    info = `時間範圍：${formatDateDisplay(startDate)} ~ ${formatDateDisplay(endDate)}`;
                } else if (startDate) {
                    info = `日期：${formatDateDisplay(startDate)}`;
                } else if (endDate) {
                    info = `截止日期：${formatDateDisplay(endDate)}`;
                }
                dateInfo.textContent = info;
                dateInfo.classList.add('active');
            } else {
                dateInfo.classList.remove('active');
            }
        }

        function getDateContext() {
            const startDate = startDateInput.value;
            const endDate = endDateInput.value;
            
            if (!startDate && !endDate) return '';
            
            let context = '\n\n[日期條件：';
            if (startDate && endDate) {
                context += `時間範圍從 ${formatDateDisplay(startDate)} 到 ${formatDateDisplay(endDate)}`;
            } else if (startDate) {
                context += `日期為 ${formatDateDisplay(startDate)}`;
            } else if (endDate) {
                context += `截止日期為 ${formatDateDisplay(endDate)}`;
            }
            context += ']';
            return context;
        }

        // Event listeners for date inputs
        startDateInput.addEventListener('change', () => {
            updateDateInfo();
            // If start date is after end date, adjust end date
            if (endDateInput.value && startDateInput.value > endDateInput.value) {
                endDateInput.value = startDateInput.value;
            }
        });

        endDateInput.addEventListener('change', () => {
            updateDateInfo();
            // If end date is before start date, adjust start date
            if (startDateInput.value && endDateInput.value < startDateInput.value) {
                startDateInput.value = endDateInput.value;
            }
        });

        clearDatesBtn.addEventListener('click', () => {
            startDateInput.value = '';
            endDateInput.value = '';
            updateDateInfo();
        });

        // Create typing indicator
        const typingIndicator = document.createElement('div');
        typingIndicator.className = 'message assistant';
        typingIndicator.innerHTML = `
            <div class="typing-indicator">
                <div class="typing-dots">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        `;

        // Add user message to chat
        function addMessage(content, isUser = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${isUser ? 'user' : 'assistant'}`;
            
            // For assistant messages, format content with markdown links
            const formattedContent = isUser ? escapeHtml(content) : formatMessage(content);
            
            messageDiv.innerHTML = `
                <div class="message-content">
                    ${formattedContent}
                </div>
            `;
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        // Format message content (convert markdown links to HTML, preserve line breaks)
        function formatMessage(text) {
            // Escape HTML first
            let formatted = escapeHtml(text);
            
            // Convert markdown headers (##, ###, etc.) to styled spans
            formatted = formatted.replace(/^### (.+)$/gm, '<div style="font-size: 1.1em; font-weight: 600; margin: 12px 0 6px 0; color: #667eea;">$1</div>');
            formatted = formatted.replace(/^## (.+)$/gm, '<div style="font-size: 1.2em; font-weight: 600; margin: 15px 0 8px 0; color: #667eea;">$1</div>');
            formatted = formatted.replace(/^# (.+)$/gm, '<div style="font-size: 1.3em; font-weight: 600; margin: 18px 0 10px 0; color: #667eea;">$1</div>');
            
            // Convert list items (* or -) to proper bullets
            formatted = formatted.replace(/^[\*\-] (.+)$/gm, '<div style="margin-left: 20px; position: relative; padding-left: 10px;"><span style="position: absolute; left: -10px;">•</span>$1</div>');
            
            // Convert **bold** to <strong>
            formatted = formatted.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            
            // Convert markdown links [text](url) to HTML links
            formatted = formatted.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            
            // Convert plain URLs that aren't already in links to clickable links
            // Use negative lookbehind to avoid matching URLs already in href=""
            formatted = formatted.replace(/(?<!href="|">)(https?:\/\/[^\s<"]+)(?!")/g, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
            
            // Convert line breaks to <br>
            formatted = formatted.replace(/\n/g, '<br>');
            
            return formatted;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Show typing indicator
        function showTypingIndicator() {
            chatMessages.appendChild(typingIndicator);
            typingIndicator.querySelector('.typing-indicator').classList.add('active');
            scrollToBottom();
        }

        // Hide typing indicator
        function hideTypingIndicator() {
            if (typingIndicator.parentNode) {
                typingIndicator.querySelector('.typing-indicator').classList.remove('active');
                typingIndicator.remove();
            }
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-message';
            errorDiv.textContent = message;
            chatMessages.appendChild(errorDiv);
            scrollToBottom();
            setTimeout(() => errorDiv.remove(), 5000);
        }

        // Scroll to bottom of chat
        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // Send message to n8n workflow
        async function sendMessage(message) {
            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Get response as text first
                const text = await response.text();
                console.log('Response text:', text);
                
                // Try to parse as JSON
                let data;
                try {
                    data = JSON.parse(text);
                } catch (e) {
                    // If not JSON, return as plain text
                    return text || '收到空回應';
                }
                
                // Extract output from response
                // The workflow returns the agent's output
                if (data.output) {
                    return data.output;
                } else if (data.response) {
                    return data.response;
                } else if (data.text) {
                    return data.text;
                } else if (typeof data === 'string') {
                    return data;
                } else if (Array.isArray(data) && data.length > 0) {
                    // If it's an array, try to get the first item
                    const firstItem = data[0];
                    return firstItem.output || firstItem.response || firstItem.text || JSON.stringify(firstItem);
                } else {
                    return JSON.stringify(data);
                }
            } catch (error) {
                console.error('Error sending message:', error);
                throw error;
            }
        }

        // Handle form submission
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = messageInput.value.trim();
            if (!message) return;

            // Disable input while processing
            messageInput.disabled = true;
            sendButton.disabled = true;

            // Get date context and append to message
            const dateContext = getDateContext();
            const fullMessage = message + dateContext;

            // Add user message to chat (display only the user's input)
            addMessage(message, true);
            messageInput.value = '';

            // Show typing indicator
            showTypingIndicator();

            try {
                // Send message to n8n workflow (with date context)
                const response = await sendMessage(fullMessage);
                
                // Hide typing indicator
                hideTypingIndicator();
                
                // Add AI response to chat
                addMessage(response, false);
            } catch (error) {
                // Hide typing indicator
                hideTypingIndicator();
                
                // Show error message
                showError('抱歉，發送訊息時發生錯誤，請稍後再試。');
            } finally {
                // Re-enable input
                messageInput.disabled = false;
                sendButton.disabled = false;
                messageInput.focus();
            }
        });

        // Focus input on load
        messageInput.focus();
    </script>
</body>
</html>
